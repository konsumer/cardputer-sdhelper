[platformio]
default_envs = cardputer

[env:cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_protocol = esp-builtin
upload_speed = 115200
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DSDCARD_CS=12
    -DSDCARD_SCK=40
    -DSDCARD_MISO=39
    -DSDCARD_MOSI=14
    -DSDCARD_MHZ=60
    -DTFT_CS=5
lib_deps =
    m5stack/M5Cardputer
    greiman/SdFat